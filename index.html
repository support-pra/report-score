<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแสดงผลคะแนนสอบรายบุคคล | โรงเรียนปราจิณราษฎรอำรุง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

    <div class="emoji-bg">
        <div class="emoji-column"><span>🎒</span><span>✏️</span><span>📏</span><span>📱</span></div>
        <div class="emoji-column"><span>📚</span><span>💻</span><span>🎓</span><span>🏫</span></div>
        <div class="emoji-column"><span>🚀</span><span>🔬</span><span>🎤</span><span>📓</span></div>
        <div class="emoji-column"><span>💡</span><span>📝</span><span>🏆</span><span>🖊️</span></div>
        <div class="emoji-column d-none d-md-flex"><span>🌟</span><span>🧬</span><span>🎯</span><span>📈</span></div>
    </div>

    <div class="header-bar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b6/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B8%9B%E0%B8%A3%E0%B8%B2%E0%B8%88%E0%B8%B4%E0%B8%93%E0%B8%A3%E0%B8%A9%E0%B8%8E%E0%B8%A3%E0%B8%AD%E0%B8%B3%E0%B8%A3%E0%B8%B8%E0%B8%87.png" id="smallLogo" class="logo-img logo-small" alt="โลโก้โรงเรียน">
        <img src="https://upload.wikimedia.org/wikipedia/th/6/69/Thai_OBEC_emblem.svg" id="obecLogo" class="logo-img logo-obec" alt="โลโก้ สพฐ.">
        <div class="header-title pt-1" id="ui-title">กำลังโหลด...</div>
        <div class="header-subtitle mt-2" id="ui-subtitle">กำลังโหลด...</div>
        <div class="header-subtitle mt-1 fw-bold" id="ui-school">กำลังโหลด...</div>
        <div class="header-subtitle mt-1 fw-bold" style="color: #FFD700;" id="ui-area">กำลังโหลด...</div>
    </div>

    <div class="container mt-4 mb-5">
        
        <div id="searchSection" class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b6/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B9%80%E0%B8%A3%E0%B8%B5%E0%B8%A2%E0%B8%99%E0%B8%9B%E0%B8%A3%E0%B8%B2%E0%B8%88%E0%B8%B4%E0%B8%93%E0%B8%A3%E0%B8%A9%E0%B8%8E%E0%B8%A3%E0%B8%AD%E0%B8%B3%E0%B8%A3%E0%B8%B8%E0%B8%87.png" class="logo-img logo-large mb-4" alt="โลโก้โรงเรียน">
                
                <div id="publicAnnouncementBox" class="announcement-box">
                    <div class="d-flex align-items-center mb-2">
                        <span class="fs-4 me-2">📢</span><h5 class="fw-bold m-0" style="color: var(--primary-color);">ประกาศจากระบบ!</h5>
                    </div>
                    <div id="publicAnnouncementText" class="text-secondary fw-bold" style="white-space: pre-wrap;">กำลังโหลดประกาศ...</div>
                </div>

                <div class="card card-custom p-4 pb-5">
                    <h4 class="text-center mb-4" style="color: var(--primary-color); font-weight: 700;">🔐 เข้าสู่ระบบเพื่อดูคะแนน</h4>
                    <form id="searchForm">
                        <div class="mb-4">
                            <input type="text" class="form-control form-control-lg text-center fs-4" id="studentIdInput" placeholder="✍️ กรอกเลขประจำตัวประชาชน" required style="border-radius: 15px; border: 2px solid var(--primary-color);">
                        </div>
                        <button type="submit" class="btn btn-login btn-custom w-100 mb-2">🚀 เข้าสู่ระบบเพื่อดูคะแนน</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="adminSection" class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-custom p-4">
                    <h4 class="text-center mb-4" style="font-weight: 700; color: var(--primary-color);">👨‍💻 ผู้ดูแลระบบ (Admin)</h4>
                    <form id="adminLoginForm">
                        <div class="mb-3"><input type="text" class="form-control fs-5" id="adminUser" placeholder="👤 Username" required></div>
                        <div class="mb-4"><input type="password" class="form-control fs-5" id="adminPass" placeholder="🔑 Password" required></div>
                        <button type="submit" class="btn w-100 mb-3 btn-custom fw-bold" style="background-color: var(--secondary-color); color: var(--primary-color);">🔓 เข้าสู่ระบบจัดการ</button>
                        <button type="button" class="btn btn-secondary w-100 btn-custom" id="btnBack">⬅️ กลับหน้าหลัก</button>
                    </form>
                    
                    <div id="adminControlPanel" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: var(--primary-color);">📢 แจ้งข่าว / อัปเดตประกาศระบบ</label>
                            <textarea class="form-control" id="adminAnnounceText" rows="4" placeholder="พิมพ์ข้อความที่ต้องการแจ้งเตือน..."></textarea>
                        </div>
                        <button class="btn btn-success w-100 mb-3 btn-custom fw-bold" id="btnSaveAnnounce">💾 บันทึกประกาศขึ้นระบบ</button>
                        <hr>
                        <button class="btn btn-login w-100 mb-3 btn-custom fw-bold" id="btnOpenDB">🗄️ เปิดฐานข้อมูล (Google Sheet)</button>
                        <button class="btn btn-danger-custom w-100 btn-custom" id="btnLogoutAdmin">🚪 ออกจากระบบแอดมิน</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboardSection" class="row justify-content-center">
            <div class="col-md-11 col-lg-9">
                <div class="card card-custom p-4 pb-4">
                    <div class="d-flex align-items-center mb-3 pb-2 border-bottom border-2" style="border-color: var(--primary-color) !important;">
                        <h4 class="m-0" style="color: var(--primary-color); font-weight: 700;">👤 ข้อมูลนักเรียน</h4>
                    </div>
                    <div id="studentInfo" class="mb-4 bg-white p-3 rounded-4 border shadow-sm" style="font-size: 1.2rem;"></div>

                    <div class="d-flex align-items-center mb-3 pb-2 border-bottom border-2" style="border-color: var(--primary-color) !important;">
                        <h4 class="m-0" style="color: var(--primary-color); font-weight: 700;">📊 ผลคะแนนสอบ</h4>
                    </div>
                    <div id="scoreGridContainer" class="score-grid"></div>
                    <div id="summaryGridContainer" class="summary-grid"></div>

                    <div class="row mb-4 justify-content-center">
                        <div class="col-md-8 text-center">
                            <a href="#" target="_blank" id="ui-fb" class="btn btn-custom btn-facebook w-100 shadow">📘 ติดต่อ Facebook โรงเรียน</a>
                        </div>
                    </div>
                    <button class="btn btn-danger-custom btn-custom w-100 shadow-sm" id="btnLogoutUser">🚪 ปิดหน้าต่าง</button>
                </div>
            </div>
        </div>

    </div>

    <button id="btnAdminFloat" class="btn-admin-float">⚙️ สำหรับผู้ดูแลระบบ</button>

    <footer class="footer" id="ui-footer"></footer>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
